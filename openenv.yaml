spec_version: 1
name: cascade-mind
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: >
  A domain-agnostic reinforcement learning environment for training agents that reason
  over hidden dependency graphs with noisy tools and a limited query budget.

  Built on OpenEnv, cascade-mind ships with two plug-and-play domains — SRE incident
  response (30 microservices) and supply chain disruption (30 supplier nodes) — and a
  DomainConfig plugin interface for adding any knowledge-graph domain in a single file.

  Key features:
  - World Modeling Layer: BeliefTracker (per-service confidence), ContradictionEngine
    (tool conflict detection), and GraphPrior (cross-episode edge frequency memory)
  - Composable OpenEnv Rubric: FBetaRubric (80%, beta=2, recall-heavy) +
    BrierScoreRubric (20%, rewards calibrated uncertainty — knowing what you don't know)
  - Anti-gaming: MutationEngine (mid-episode topology drift), CurriculumScheduler
    (difficulty-gated F-beta unlock), OverclaimGuard (penalty for over-predicting)
  - GRPO-ready: every episode exports training-ready JSONL via /export/grpo

tags:
  - reinforcement-learning
  - knowledge-graph
  - world-modeling
  - openenv
  - grpo
  - sre
  - supply-chain
  - llm
  - brier-score
  - curriculum-learning

env_vars:
  HF_TOKEN:
    description: HuggingFace token with Cerebras Inference Providers access (Llama-3.1-8B)
    required: true
    secret: true
  LLM_SIMULATOR_ENABLED:
    description: Set to "true" to enable LLM-generated observations, "false" for template fallbacks
    required: false
    default: "true"
  LLM_CACHE_PATH:
    description: Path to the JSON disk cache for LLM responses
    required: false
    default: /tmp/llm_sim_cache.json
